changelog:
  exclude:
    labels:
      - codex
      - created by codex
      - created by copilot
      - blocked
      - blocks
      - must-have
      - should-have
  categories:
    - title: Features
      labels:
        - enhancement
    - title: Fixes
      labels:
        - bug
    - title: Documentation
      labels:
        - documentation
    - title: Other Changes
      labels:
        - "*"
