name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      checks: read
      statuses: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify gh authentication
        run: gh auth status
        env:
          GH_TOKEN: ${{ github.token }}
