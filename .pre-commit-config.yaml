repos:
  # --- Python: format + lint -----------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # --- General hygiene (extended per pre-commit-verification.md) -----
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: no-commit-to-branch
        args: [--branch, main]
      # Catches stray pdb/breakpoint() left from debugging.
      - id: debug-statements
      # Secrets-before-commit.
      - id: detect-private-key

  # --- Secrets detection ---------------------------------------------
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: Detect accidentally-committed secrets
        args: [--baseline, .secrets.baseline]
        exclude: ^(\.secrets\.baseline$|scripts/tests/.*)
